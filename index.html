<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>신화미트 ERP</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:-apple-system,"Malgun Gothic","맑은 고딕",sans-serif;background:#f4f5f7;color:#222;font-size:15px}
  header{background:#7a1f2b;color:#fff;padding:14px 18px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px}
  header h1{font-size:18px;font-weight:600}
  header .stat{font-size:12px;opacity:.85}
  .tabs{display:flex;background:#fff;border-bottom:1px solid #e3e3e3;position:sticky;top:0;z-index:5}
  .tabs button{flex:1;padding:14px 6px;border:none;background:none;font-size:14px;font-weight:600;color:#888;cursor:pointer;border-bottom:3px solid transparent}
  .tabs button.on{color:#7a1f2b;border-bottom-color:#7a1f2b}
  .wrap{padding:14px;max-width:1200px;margin:0 auto}
  .bar{display:flex;gap:10px;flex-wrap:wrap;align-items:center;margin-bottom:12px}
  input,select{padding:9px 11px;border:1px solid #ccc;border-radius:8px;font-size:15px}
  input.search{flex:1;min-width:180px}
  .cards{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:12px}
  .card{background:#fff;border:1px solid #eaeaea;border-radius:10px;padding:12px 16px;flex:1;min-width:130px}
  .card .lbl{font-size:12px;color:#888}
  .card .val{font-size:19px;font-weight:700;margin-top:3px}
  .scroll{overflow-x:auto;border-radius:10px;border:1px solid #eaeaea}
  table{width:100%;border-collapse:collapse;background:#fff}
  th,td{padding:9px 10px;text-align:right;border-bottom:1px solid #f0f0f0;font-size:13.5px;white-space:nowrap}
  th{background:#fafafa;color:#666;font-weight:600}
  td.l,th.l{text-align:left}
  tr:hover td{background:#fafbfc}
  .pos{color:#1a7f37;font-weight:600}
  .neg{color:#c0392b;font-weight:600}
  .muted{color:#999;font-size:13px}
  .loading{padding:40px;text-align:center;color:#999}
  .link{color:#7a1f2b;cursor:pointer;text-decoration:underline}
  .rowpay td{background:#f3f8f3}
  tr.carry td{background:#fafafa;font-weight:600}
  tr.sub td{background:#eef2f5;color:#555;font-weight:600}
  tr.mtot td{background:#f3eaec;color:#7a1f2b;font-weight:700}
  tr.mend td{background:#7a1f2b;color:#fff;font-weight:700}
  .tag{display:inline-block;padding:1px 7px;border-radius:10px;font-size:12px;font-weight:600}
  .tag.s{background:#fdecea;color:#c0392b}.tag.p{background:#e8f5e9;color:#1a7f37}
  .tag.g{background:#eef;color:#3949ab}
  .clist{display:flex;flex-direction:column;gap:1px;max-height:320px;overflow:auto;border:1px solid #eee;border-radius:8px;background:#fff}
  .clist div{padding:9px 12px;cursor:pointer;display:flex;justify-content:space-between;border-bottom:1px solid #f3f3f3}
  .clist div:hover{background:#faf3f4}
  @media(max-width:600px){.wrap{padding:8px}th,td{padding:7px 6px;font-size:12.5px}}
  #login{position:fixed;inset:0;background:#7a1f2b;display:flex;align-items:center;justify-content:center;z-index:1000}
  #login .loginbox{background:#fff;padding:34px 28px;border-radius:14px;width:300px;text-align:center;box-shadow:0 12px 44px rgba(0,0,0,.35)}
  #login h2{color:#7a1f2b;margin-bottom:18px}
  #login input{display:block;width:100%;margin:8px 0;padding:11px;border:1px solid #ccc;border-radius:8px;font-size:15px}
  #login button{width:100%;margin-top:12px;padding:12px;background:#7a1f2b;color:#fff;border:none;border-radius:8px;font-size:15px;font-weight:700;cursor:pointer}
  #logout{display:none;background:rgba(255,255,255,.2);color:#fff;border:none;padding:5px 11px;border-radius:6px;cursor:pointer;font-size:12px}
</style>
</head>
<body>
<div id="login"><div class="loginbox">
  <h2>🥩 신화미트 ERP</h2>
  <p class="muted" style="margin-bottom:18px">대표 계정으로 로그인하세요</p>
  <button id="lg-google">Google로 로그인</button>
  <p id="lg-msg" class="muted" style="margin-top:12px;min-height:18px"></p>
</div></div>
<header><h1>🥩 <span id="hdrname">신화미트</span> ERP</h1><div style="display:flex;align-items:center;gap:10px"><select id="company" style="display:none;padding:5px 8px;border-radius:6px"></select><span class="stat" id="stat">불러오는 중...</span><button id="logout">로그아웃</button></div></header>
<div class="tabs">
  <button class="on" data-v="misu">거래처 미수/미지급</button>
  <button data-v="item">상품원장(재고)</button>
  <button data-v="ledger">거래처원장</button>
</div>
<div class="wrap">
  <section id="v-misu">
    <div class="cards">
      <div class="card"><div class="lbl">받을 미수금</div><div class="val pos" id="m-pos">-</div></div>
      <div class="card"><div class="lbl">줄 미지급금</div><div class="val neg" id="m-neg">-</div></div>
      <div class="card"><div class="lbl">순액</div><div class="val" id="m-net">-</div></div>
    </div>
    <div class="bar"><input class="search" id="m-search" placeholder="거래처명 검색"></div>
    <p class="muted" style="margin-bottom:6px">거래처명을 누르면 이번 달 거래처원장이 열립니다. 현재 미수 = 2025 이월 + 올해 매출 − 총 수금.</p>
    <div class="scroll"><table><thead><tr><th class="l">거래처명</th><th>2025 이월</th><th>올해 매출</th><th>총 수금</th><th>현재 미수</th></tr></thead>
      <tbody id="m-body"><tr><td colspan="5" class="loading">불러오는 중...</td></tr></tbody></table></div>
  </section>

  <section id="v-item" style="display:none">
    <div class="cards">
      <div class="card"><div class="lbl">품목 수</div><div class="val" id="i-cnt">-</div></div>
      <div class="card"><div class="lbl">총 재고량</div><div class="val" id="i-kg">-</div></div>
      <div class="card"><div class="lbl">총 재고금액</div><div class="val" id="i-amt">-</div></div>
    </div>
    <div class="bar"><input class="search" id="i-search" placeholder="상품명 검색"></div>
    <div class="scroll"><table><thead><tr>
      <th class="l">상품명</th><th class="l">원산지</th><th class="l">등급</th><th class="l">입고일</th>
      <th class="l">구분</th><th class="l">입고처</th><th>입고Kg</th><th>입고단가</th>
      <th>잔량Kg</th><th>잔량금액</th><th class="l">이력번호</th><th class="l">소비기한</th></tr></thead>
      <tbody id="i-body"><tr><td colspan="12" class="loading">상품원장 탭을 누르면 불러옵니다</td></tr></tbody></table></div>
  </section>

  <section id="v-ledger" style="display:none">
    <div class="bar">
      <input class="search" id="l-search" placeholder="거래처명 검색 후 선택">
      <select id="l-month"></select>
    </div>
    <div id="l-list" class="clist"></div>
    <div id="l-out"><p class="muted">거래처를 검색해서 선택하세요.</p></div>
  </section>
  <div id="counts" class="muted" style="text-align:center;padding:16px 8px;border-top:1px solid #eaeaea;margin-top:18px">데이터 현황 확인 중...</div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, initializeFirestore, collection, getDocs, getCountFromServer, doc, getDoc, query, where } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";
import { getAuth, GoogleAuthProvider, signInWithRedirect, getRedirectResult, onAuthStateChanged, signOut, setPersistence, browserLocalPersistence } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
const firebaseConfig={apiKey:"AIzaSyB63DtgWz20gspl9AaFCM0qBHBSaWiBL1s",authDomain:"sinhwa-erp.firebaseapp.com",projectId:"sinhwa-erp",storageBucket:"sinhwa-erp.firebasestorage.app",messagingSenderId:"211386518933",appId:"1:211386518933:web:75f00d15b158be43fdba9c"};
let COMPANY="sinhwameat";
const COMPANIES={sinhwameat:"신화미트", sinhwafood:"신화푸드"};
const app=initializeApp(firebaseConfig);
let db;
try{ db=initializeFirestore(app,{experimentalForceLongPolling:true}); }
catch(e){ db=getFirestore(app); }
const col=(n)=>collection(db,`companies/${COMPANY}/${n}`);
const auth=getAuth(app);
setPersistence(auth, browserLocalPersistence).catch(()=>{});
const won=(v)=>Math.round(v).toLocaleString("ko-KR");
const fd=(d)=>d&&d.length===8?`${d.slice(0,4)}/${d.slice(4,6)}/${d.slice(6)}`:(d||"");

let balances=[], lots=null, itemMap=null, custCache={}, allTx=null, nameMap=null;
const $=(id)=>document.getElementById(id);
const m_pos=$("m-pos"), m_neg=$("m-neg"), m_net=$("m-net"), m_body=$("m-body"), m_search=$("m-search");
const i_cnt=$("i-cnt"), i_kg=$("i-kg"), i_amt=$("i-amt"), i_body=$("i-body"), i_search=$("i-search");
const stat=$("stat");
const nowYM=()=>{const d=new Date();return `${d.getFullYear()}${String(d.getMonth()+1).padStart(2,"0")}`;};

function switchTo(v){
  document.querySelectorAll(".tabs button").forEach(x=>x.classList.toggle("on",x.dataset.v===v));
  ["misu","item","ledger"].forEach(k=>document.getElementById("v-"+k).style.display=k===v?"":"none");
  if(v==="item"&&!lots) loadLots();
}
document.querySelectorAll(".tabs button").forEach(b=>b.onclick=()=>switchTo(b.dataset.v));

// ===== 미수/미지급 =====
let misuRows=[], curKw="";
async function loadAllTx(){
  if(allTx) return allTx;
  const [s,p]=await Promise.all([getDocs(col("sales")), getDocs(col("payments"))]);
  const agg={}, byCust={};
  const add=(c)=>{ if(!agg[c]) agg[c]={sale:0,pay:0}; if(!byCust[c]) byCust[c]={sales:[],pays:[]}; };
  s.docs.forEach(d=>{const x=d.data(); if((x.date||"")<"20260101")return; add(x.cust); agg[x.cust].sale+=(x.supply||0)+(x.vat||0); byCust[x.cust].sales.push(x);});
  p.docs.forEach(d=>{const x=d.data(); if((x.date||"")<"20260101")return; add(x.cust); agg[x.cust].pay+=(x.amt||0)+(x.dc||0); byCust[x.cust].pays.push(x);});
  return allTx={agg,byCust};
}
async function loadNames(){
  if(nameMap) return nameMap; nameMap={};
  try{ (await getDocs(col("members"))).docs.forEach(d=>{const x=d.data(); if(x.code) nameMap[x.code]=x.name;}); }catch(e){}
  balances.forEach(b=>{ if(b.name) nameMap[b.code]=b.name; });
  return nameMap;
}
async function loadMisu(){
  const snap=await getDocs(col("balances"));
  balances=snap.docs.map(d=>d.data());
  stat.textContent=`거래처 ${balances.filter(x=>x.balance!==0).length}곳 · 실시간`;
  // 1차: 이월만 표시(매출·수금 계산중)
  misuRows=balances.filter(x=>x.balance!==0).map(x=>({code:x.code,name:x.name,open:x.balance,sale:null,pay:null,current:x.balance}));
  misuRows.sort((a,b)=>b.current-a.current);
  m_pos.textContent="계산중…"; m_neg.textContent="…"; m_net.textContent="…";
  renderMisu(curKw);
  // 2차: 올해 거래 집계 후 보강
  const [{agg},nm]=await Promise.all([loadAllTx(),loadNames()]);
  const obal={}; balances.forEach(b=>obal[b.code]=b.balance||0);
  const codes=new Set([...balances.map(b=>b.code), ...Object.keys(agg)]);
  misuRows=[...codes].map(c=>{const a=agg[c]||{sale:0,pay:0}; const op=obal[c]||0;
    return {code:c,name:nm[c]||c,open:op,sale:a.sale,pay:a.pay,current:op+a.sale-a.pay};})
    .filter(r=>r.open||r.sale||r.pay||r.current);
  misuRows.sort((a,b)=>b.current-a.current);
  const pos=misuRows.filter(r=>r.current>0).reduce((s,r)=>s+r.current,0);
  const neg=misuRows.filter(r=>r.current<0).reduce((s,r)=>s+r.current,0);
  m_pos.textContent=won(pos); m_neg.textContent=won(-neg); m_net.textContent=won(pos+neg);
  renderMisu(curKw);
}
function renderMisu(kw){
  curKw=kw;
  m_body.innerHTML=misuRows.filter(x=>!kw||(x.name||"").includes(kw)).map(x=>
    `<tr><td class="l"><span class="link" onclick="goLedger('${x.code}')">${x.name}</span></td>
     <td>${won(x.open)}</td>
     <td>${x.sale==null?'<span class="muted">계산중</span>':won(x.sale)}</td>
     <td>${x.pay==null?'':won(x.pay)}</td>
     <td class="${x.current>0?'pos':(x.current<0?'neg':'')}">${won(x.current)}</td></tr>`
  ).join("")||`<tr><td colspan="5" class="loading">결과 없음</td></tr>`;
}
m_search.oninput=e=>renderMisu(e.target.value.trim());

// ===== 상품원장(재고 LOT) =====
async function loadLots(){
  lots=[];
  try{
    const s=await getDoc(doc(db,`companies/${COMPANY}/meta/lots`));
    if(s.exists() && s.data().data){ lots=JSON.parse(s.data().data); }
  }catch(e){}
  if(!lots.length){ // 예전 방식(컬렉션) 호환
    try{ const c=await getDocs(col("lots")); lots=c.docs.map(d=>d.data()); }catch(e){}
  }
  lots.sort((a,b)=>(a.name||"").localeCompare(b.name||"","ko"));
  const isAdj=(x)=>Math.abs((x.kg||0)-(x.amount||0))<1 && (x.kg||0)!==0; // 수수료·재고조정(Kg칸에 원)
  const phys=lots.filter(x=>!isAdj(x));
  i_cnt.textContent=new Set(phys.map(x=>x.code)).size.toLocaleString();
  i_kg.textContent=won(phys.reduce((s,x)=>s+(x.kg||0),0))+" Kg";
  i_amt.textContent=won(lots.reduce((s,x)=>s+(x.amount||0),0));
  renderLots("");
}
function renderLots(kw){
  i_body.innerHTML=lots.filter(x=>!kw||(x.name||"").includes(kw)).map(x=>
    `<tr><td class="l">${x.name}</td><td class="l">${x.origin||""}</td><td class="l">${x.grade||""}</td>
     <td class="l">${x.indate||""}</td><td class="l"><span class="tag g">${x.gubun||""}</span></td>
     <td class="l">${x.supplier||""}</td><td>${x.inkg||""}</td><td>${won(x.inprice||0)}</td>
     <td>${(x.kg||0).toLocaleString()}</td><td>${won(x.amount||0)}</td>
     <td class="l">${x.lot||""}</td><td class="l">${x.expiry||""}</td></tr>`
  ).join("")||`<tr><td colspan="12" class="loading">결과 없음</td></tr>`;
}
i_search.oninput=e=>renderLots(e.target.value.trim());

// ===== 거래처원장 =====
function fillMonths(){
  const sel=document.getElementById("l-month"); const cur=nowYM(); const y=cur.slice(0,4);
  for(let mth=parseInt(cur.slice(4));mth>=1;mth--){const ym=`${y}${String(mth).padStart(2,"0")}`;
    const o=document.createElement("option");o.value=ym;o.textContent=`${y}년 ${mth}월`;sel.appendChild(o);}
  sel.value=cur;
}
document.getElementById("l-search").oninput=e=>{
  const kw=e.target.value.trim(); const list=document.getElementById("l-list");
  if(!kw){list.innerHTML="";return;}
  const src=misuRows.length?misuRows:balances.map(x=>({code:x.code,name:x.name,current:x.balance}));
  const hits=src.filter(x=>(x.name||"").includes(kw)).slice(0,30);
  list.innerHTML=hits.map(x=>`<div onclick="goLedger('${x.code}')"><span>${x.name}</span><span class="${x.current>0?'pos':'neg'}">${won(Math.abs(x.current||0))}</span></div>`).join("")
    ||`<div class="muted">결과 없음</div>`;
};
document.getElementById("l-month").onchange=()=>{ if(window._curCust) openLedger(window._curCust); };

async function loadItems(){
  if(itemMap) return itemMap; itemMap={};
  (await getDocs(col("items"))).docs.forEach(d=>{const x=d.data();itemMap[x.code]={name:x.name,origin:x.origin,grade:x.grade};});
  return itemMap;
}
async function loadCust(code){
  await loadItems();
  const {byCust}=await loadAllTx(); await loadNames();
  const c=byCust[code]||{sales:[],pays:[]};
  const bal=(balances.find(x=>x.code===code)||{}).balance||0;
  return {sales:c.sales, pays:c.pays, bal, name:(nameMap[code]||code)};
}
window.goLedger=(code)=>{ switchTo("ledger"); window._curCust=code;
  document.getElementById("l-month").value=nowYM(); document.getElementById("l-list").innerHTML=""; openLedger(code); };

async function openLedger(code){
  window._curCust=code;
  const out=document.getElementById("l-out"); out.innerHTML='<p class="loading">불러오는 중...</p>';
  const ym=document.getElementById("l-month").value;
  const {sales,pays,bal,name}=await loadCust(code);
  const mStart=ym+"01", mEnd=ym+"31";
  // 연초(2025-12-31) 기초 + 2026 거래 = 흐름. 2026 이전 거래는 기초에 이미 포함 → 제외
  const SINCE="20260101";
  let before=0, allnet=0;
  sales.forEach(x=>{if(x.date<SINCE) return; const v=(x.supply||0)+(x.vat||0); allnet+=v; if(x.date<mStart) before+=v;});
  pays.forEach(x=>{if(x.date<SINCE) return; const v=(x.amt||0)+(x.dc||0); allnet-=v; if(x.date<mStart) before-=v;});
  const carry=bal+before;     // 전월이월 = 기초 + 이 달 시작 전 2026거래
  const current=bal+allnet;   // 현재 미수 = 기초 + 2026 전체거래
  const lines=[];
  sales.forEach(x=>{if(x.date>=mStart&&x.date<=mEnd){const it=itemMap[x.item]||{};
    lines.push({d:x.date,t:"s",nm:it.name||x.item,og:it.origin||"",gr:it.grade||"",box:x.box||0,kg:x.kg||0,
      price:x.price||(x.kg?Math.round((x.supply||0)/x.kg):0),amt:(x.supply||0)+(x.vat||0)});}});
  pays.forEach(x=>{if(x.date>=mStart&&x.date<=mEnd) lines.push({d:x.date,t:"p",amt:(x.amt||0)+(x.dc||0)});});
  lines.sort((a,b)=>a.d===b.d?(a.t==="s"?-1:1):(a.d<b.d?-1:1));

  const og=(x)=>x.og?`${x.og}${x.gr?'('+x.gr+')':''}`:"";
  let run=carry, mKg=0,ts=0,tp=0;
  let dKg=0,dAmt=0,dPay=0,curD=null,body="";
  const colspanL=6;
  body+=`<tr class="carry"><td class="l" colspan="${colspanL}">전월이월</td><td></td><td>${won(carry)}</td></tr>`;
  const dayRow=()=>{ if(curD!==null){
    body+=`<tr class="sub"><td class="l" colspan="4">▷ ${fd(curD)} 합계</td><td>${dKg?dKg.toFixed(1):""}</td><td></td>`+
          `<td>${dAmt?won(dAmt):(dPay?'<span class=pos>수금 '+won(dPay)+'</span>':"")}</td><td>${won(run)}</td></tr>`;
    } dKg=dAmt=dPay=0; };
  for(const x of lines){
    if(x.d!==curD){ dayRow(); curD=x.d; }
    if(x.t==="s"){ run+=x.amt; ts+=x.amt; mKg+=x.kg; dKg+=x.kg; dAmt+=x.amt;
      body+=`<tr><td>${fd(x.d)}</td><td class="l">${x.nm}</td><td class="l">${og(x)}</td><td>${x.box||""}</td>`+
            `<td>${x.kg||""}</td><td>${won(x.price)}</td><td>${won(x.amt)}</td><td>${won(run)}</td></tr>`;
    } else { run-=x.amt; tp+=x.amt; dPay+=x.amt;
      body+=`<tr class="rowpay"><td>${fd(x.d)}</td><td class="l"><span class="tag p">수금</span></td><td class="l"></td>`+
            `<td></td><td></td><td></td><td class="pos">${won(x.amt)}</td><td>${won(run)}</td></tr>`;
    }
  }
  dayRow();
  body+=`<tr class="mtot"><td class="l" colspan="4">■ ${ym.slice(4)}월 합계 (매출 ${won(ts)} · 수금 ${won(tp)})</td>`+
        `<td>${mKg?mKg.toFixed(1):""}</td><td></td><td>${won(ts)}</td><td>${won(run)}</td></tr>`;
  body+=`<tr class="mend"><td class="l" colspan="${colspanL}">월말 잔액</td><td></td><td>${won(run)}</td></tr>`;

  out.innerHTML=`<div class="cards">
      <div class="card"><div class="lbl">${name} · 현재 미수</div><div class="val ${current>=0?'pos':'neg'}">${won(Math.abs(current))}${current<0?' (미지급)':''}</div></div>
      <div class="card"><div class="lbl">${ym.slice(4)}월 매출</div><div class="val">${won(ts)}</div></div>
      <div class="card"><div class="lbl">${ym.slice(4)}월 수금</div><div class="val">${won(tp)}</div></div>
    </div>
    <div class="scroll"><table><thead><tr><th>월/일</th><th class="l">상품명</th><th class="l">원산지(등급)</th><th>Box</th><th>Kg</th><th>단가</th><th>금액</th><th>미수잔액</th></tr></thead>
    <tbody>${body}</tbody></table></div>
    <p class="muted" style="margin-top:8px">* 전월이월·미수잔액 = 연초(2025-12-31) 기초 + 올해 거래 누계. 매출·수금이 다 올라오면 정확히 맞습니다.</p>`;
}
window.openLedger=openLedger;

// ===== 로그인 게이트 =====
let _started=false;
function loadCompanyData(){
  balances=[]; allTx=null; nameMap=null; lots=null; itemMap=null; custCache={}; misuRows=[];
  document.getElementById("hdrname").textContent=COMPANIES[COMPANY]||COMPANY;
  const itemTab=document.querySelector('.tabs button[data-v="item"]');
  if(itemTab) itemTab.style.display=(COMPANY==="sinhwafood")?"none":"";
  m_body.innerHTML='<tr><td colspan="5" class="loading">불러오는 중...</td></tr>';
  i_body.innerHTML='<tr><td colspan="12" class="loading">상품원장 탭을 누르면 불러옵니다</td></tr>';
  document.getElementById("l-out").innerHTML='<p class="muted">거래처를 검색해서 선택하세요.</p>';
  document.getElementById("l-list").innerHTML="";
  const _to=setTimeout(()=>{ if(m_body.innerHTML.includes("불러오는"))
    m_body.innerHTML=`<tr><td colspan="5" class="loading">연결이 지연됩니다.<br>① 인터넷 ② 보안규칙 ③ 데이터 업로드 확인.</td></tr>`; }, 15000);
  loadMisu().then(()=>clearTimeout(_to)).catch(e=>{ clearTimeout(_to); stat.textContent="연결 오류";
    m_body.innerHTML=`<tr><td colspan="5" class="loading">데이터를 못 불러왔습니다.<br><small>${e.message}</small></td></tr>`;});
  loadCounts();
}
function startApp(){
  if(_started) return; _started=true;
  fillMonths();
  const sel=document.getElementById("company");
  sel.innerHTML=Object.entries(COMPANIES).map(([k,v])=>`<option value="${k}">${v}</option>`).join("");
  sel.value=COMPANY; sel.style.display="";
  sel.onchange=()=>{ COMPANY=sel.value; switchTo("misu"); loadCompanyData(); };
  loadCompanyData();
}
async function doLogin(){
  $("lg-msg").textContent="구글 로그인 화면으로 이동합니다...";
  try{ await signInWithRedirect(auth, new GoogleAuthProvider()); }
  catch(e){ $("lg-msg").textContent="로그인 실패 — 다시 시도하세요. ("+(e.code||"")+")"; }
}
getRedirectResult(auth).catch(e=>{ $("lg-msg").textContent="로그인 실패: "+(e.code||e.message||""); });
$("lg-google").onclick=doLogin;
$("logout").onclick=()=>signOut(auth);
onAuthStateChanged(auth, user=>{
  if(user){ $("login").style.display="none"; $("logout").style.display=""; startApp(); }
  else{ $("login").style.display="flex"; $("logout").style.display="none"; }
});

async function loadCounts(){
  try{
    const names=[["거래처","balances"],["품목","items"],["재고","lots"],["매출","sales"],["수금","payments"],["매입","purchases"]];
    const cs=await Promise.all(names.map(([,c])=>getCountFromServer(col(c)).then(s=>s.data().count).catch(()=>null)));
    let dates="";
    try{
      const [st,lt]=await Promise.all([
        getDoc(doc(db,`companies/${COMPANY}/meta/status`)).catch(()=>null),
        getDoc(doc(db,`companies/${COMPANY}/meta/lots`)).catch(()=>null)]);
      const s=(st&&st.exists())?st.data():{};
      const lup=(lt&&lt.exists())?lt.data().updated:null;
      const fmt=(iso)=>{ if(!iso)return "—"; const d=new Date(iso);
        return `${d.getMonth()+1}/${d.getDate()} ${String(d.getHours()).padStart(2,"0")}:${String(d.getMinutes()).padStart(2,"0")}`; };
      dates=`<br>🕒 마지막 업데이트 — 거래 <b>${fmt(s.sync)}</b> · 재고 <b>${fmt(lup||s.stock)}</b> · 미수 <b>${fmt(s.balances)}</b>`;
    }catch(e){}
    document.getElementById("counts").innerHTML="📊 데이터 현황 &nbsp; "+
      names.map(([k],i)=>cs[i]==null?"":`${k} <b>${cs[i].toLocaleString()}</b>건`).filter(Boolean).join(" · ")+dates;
  }catch(e){ document.getElementById("counts").textContent=""; }
}
</script>
